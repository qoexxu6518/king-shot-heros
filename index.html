  table{border-collapse:separate;border-spacing:0;width:100%;min-width:1700px}
  thead th{position:sticky;top:0;background:linear-gradient(180deg,#fed7aa 0%,#fbcb8e 100%);color:#7c2d12;padding:9px 10px;text-align:left;font-weight:700;border-bottom:2px solid #dd6b20;white-space:nowrap;z-index:2;font-size:12px}

  thead tr.filter-row input:focus,thead tr.filter-row select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(221,107,32,.18)}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.5}
  tbody tr:nth-child(even) td{background:var(--row-alt)}
  tbody tr:hover td{background:var(--hover)}
  .badge{display:inline-block;padding:2px 9px;border-radius:11px;font-size:11px;color:#fff;font-weight:700;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,.12)}

  .b-u-步兵{background:linear-gradient(180deg,#fc8181,#c53030)} .b-u-騎兵{background:linear-gradient(180deg,#68d391,#2f855a)} .b-u-弓兵{background:linear-gradient(180deg,#f6ad55,#dd6b20)}
  .col-unit{min-width:64px;width:64px}
  .avatar{width:72px;height:72px;border-radius:8px;object-fit:cover;background:#fff3e0;border:2px solid #f6ad55;box-shadow:0 1px 3px rgba(221,107,32,.18)}
  .name-cell{min-width:120px}
  .name-cn{font-weight:700;font-size:14px;color:#7c2d12}
  .name-en{display:block;color:var(--muted);font-size:11px;margin-top:2px}
  .src-tags{display:flex;flex-direction:column;gap:3px;min-width:110px}
  .src-tag{display:inline-block;padding:2px 8px;border-radius:4px;background:#fff3e0;color:#7c2d12;font-size:11px;border:1px solid #f6ad55;font-weight:500}
  .gear-cell{min-width:240px}
  .gear-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
  .gear-icon{width:44px;height:44px;border-radius:6px;background:#fff7ea;border:1px solid #f6ad55;object-fit:contain;flex-shrink:0;padding:2px}
  .gear-body{flex:1;min-width:0}
  .gear-name{font-weight:700;color:var(--accent-2);font-size:12px;margin-bottom:2px}
  .gear-desc{color:#3b2412;font-size:11.5px;line-height:1.45}
  .stats-list{margin:0;padding-left:0;list-style:none;font-size:11.5px;color:#3b2412}
  .stats-list li{padding:1px 0}
  .stats-list .v{color:#2f855a;font-weight:700;margin-left:4px}
  .skill-icons{display:flex;flex-wrap:wrap;gap:6px;min-width:200px}
  .skill-icon-wrap{position:relative;display:inline-block}
  .skill-icon{width:60px;height:60px;border-radius:8px;background:#fff7ea;border:1px solid #f6ad55;object-fit:contain;cursor:help;transition:transform .15s,border-color .15s;padding:2px}
  .skill-icon:hover{transform:scale(1.08);border-color:var(--accent);box-shadow:0 2px 8px rgba(221,107,32,.3)}
  .tip{position:absolute;left:50%;top:calc(100% + 6px);transform:translateX(-50%);min-width:260px;max-width:360px;background:#2d1810;color:#fff7ea;padding:9px 11px;border-radius:6px;font-size:12px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.28);z-index:50;display:none;white-space:normal;text-align:left;pointer-events:none;border:1px solid #dd6b20}
  .tip .tip-title{font-weight:700;color:#fbbf24;margin-bottom:4px;font-size:12.5px}
  .tip .tip-tag{display:inline-block;font-size:10px;background:#7c2d12;color:#fed7aa;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
  .skill-icon-wrap:hover .tip{display:block}
  .summary-cell{min-width:240px;max-width:340px;color:#3b2412;font-size:12px;line-height:1.55}
  .gen-cell{white-space:nowrap}
  .empty{color:#a8916f;font-style:italic;font-size:11.5px}
</style>
</head>

<script>
const RAW = JSON.parse(document.getElementById('HERO_DATA').textContent);
const TW = RAW.tw || {};
const HEROES = RAW.d || [];

const CN_NAMES = {
  jaeger:'杰格', eric:'埃里克', petra:'佩特拉', hilde:'希爾德', zoe:'佐伊', marlin:'馬林',
  jabel:'賈貝爾', amadeus:'阿瑪迪斯', helga:'海爾加', saul:'索爾',
  amane:'天音', yeonwoo:'延宇', fahd:'法赫德', chenko:'陳科', gordon:'戈登',
  diana:'戴安娜', howard:'霍華德', quinn:'奎因',
  olive:'奧莉芙', edwin:'埃德溫', seth:'賽斯', forrest:'福雷斯特',
  alcar:'阿爾卡'
};
const UNIT_ORDER = {'步兵':0,'騎兵':1,'弓兵':2};

const t = k => (k && TW[k]) ? TW[k] : (k || '');
const img = p => p ? ('.' + p) : '';
const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function cnName(h){
  if (CN_NAMES[h.slug]) return CN_NAMES[h.slug];
  const tr = TW[h.title];
  if (tr && tr !== h.title && !/^[A-Za-z\s.'\-]+$/.test(tr)) return tr;
  return h.name || h.slug;
}
function isKey(v){ return typeof v === 'string' && /^heroes\.[a-z]/.test(v); }
function safeT(k, fallback){
  if (!k) return fallback || '';
  if (!isKey(k)) return k;
  const v = TW[k];
  if (!v || v === k) return fallback || '';
  return v;
}
function isTroopStat(label){
  if (!label) return false;
  if (/Might|TroopHp/.test(label)) return true;
  return /步兵殺傷力|步兵生命值|步兵殺傷力|騎兵殺傷力|騎兵生命值|騎兵殺傷力|弓兵殺傷力|弓兵生命值|弓兵殺傷力/.test(label);
}

function genInfo(h){
  if (h.rarity === 'R') return {label:'R', order:0, cls:'b-r'};
  if (h.rarity === 'SR') return {label:'SR', order:1, cls:'b-sr'};
  const g = h.generation || 1;
  return {label:'第 '+g+' 代', order:g+10, cls:'b-gen'};
}

function unitTW(h){
  const u = t(h.unit) || h.unit || '';
  if (u.includes('步')) return '步兵';
  if (u.includes('騎') || u.includes('骑')) return '騎兵';
  if (u.includes('弓')) return '弓兵';
  // fallback from English
  const e = (h.unit||'').toLowerCase();
  if (e.includes('infantry')) return '步兵';
  if (e.includes('cavalry')) return '騎兵';
  if (e.includes('marksman') || e.includes('archer')||e.includes('ranged')) return '弓兵';
  return u || '—';
}

function sourcesHTML(h){
  const arr = h.sources || [];
  if (!arr.length) return '<span class="empty">—</span>';
  return '<div class="src-tags">' + arr.map(s => '<span class="src-tag">'+esc(t(s))+'</span>').join('') + '</div>';
}

function statsListHTML(stats){
  if (!stats || !stats.length) return '<span class="empty">—</span>';
  return '<ul class="stats-list">' + stats.map(s => {
    const label = esc(t(s.label) || s.label || '');
    const val = esc(s.value || '');
    return '<li>'+label+'<span class="v">'+val+'</span></li>';
  }).join('') + '</ul>';
}

function gearExclusiveSkillHTML(h, type){
  const eg = h.exclusiveGear;
  if (!eg) return '<span class="empty">—</span>';
  const skills = (eg.skills||[]).filter(s => s.type === type);
  if (!skills.length) return '<span class="empty">—</span>';
  const name = esc(safeT(eg.name, '專屬裝備'));
  const icon = eg.icon ? '<img class="gear-icon" src="'+img(eg.icon)+'" alt="" loading="lazy">' : '';
  return skills.map(s => {
    const descKey = s.desc || s.description;
    const desc = esc(safeT(descKey, ''));
    const upKey = s.upgrade;
    const upgrade = upKey ? esc(safeT(upKey, '')) : '';
    const upHTML = upgrade ? '<div class="gear-desc" style="color:#c05621;margin-top:3px;font-size:11px;font-weight:500">'+upgrade+'</div>' : '';
    const descHTML = desc ? '<div class="gear-desc">'+desc+'</div>' : '<div class="gear-desc empty">—</div>';
    return '<div class="gear-row">'+icon+
      '<div class="gear-body"><div class="gear-name">'+name+'</div>'+
      descHTML+upHTML+'</div></div>';
  }).join('');
}

function gearExpeditionStatsHTML(h){
  const eg = h.exclusiveGear;
  if (!eg || !eg.stats || !eg.stats.length) return '<span class="empty">—</span>';
  // Only show troop-type stats (e.g. 弓兵殺傷力 / 弓兵生命值)
  const filtered = eg.stats.filter(s => isTroopStat(s.label));
  if (!filtered.length) return '<span class="empty">—</span>';
  return statsListHTML(filtered);
}

function skillIconsHTML(h, section){
  const sec = h[section];
  if (!sec || !sec.skills || !sec.skills.length) return '<span class="empty">—</span>';
  const tagTW = section==='conquest' ? '討伐' : '遠征';
  return '<div class="skill-icons">' + sec.skills.map((s, idx) => {
    const ic = s.icon ? '<img class="skill-icon" src="'+img(s.icon)+'" alt="" loading="lazy">' : '<span class="skill-icon"></span>';
    const descKey = s.desc || s.description;
    const sd = esc(safeT(descKey, ''));
    const upKey = s.upgrade;
    const up = upKey ? esc(safeT(upKey, '')) : '';
    const upHTML = up ? '<div style="margin-top:4px;color:#fbbf24;font-size:11px">'+up+'</div>' : '';
    const title = '技能 '+(idx+1);
    const sdHTML = sd || '<span style="color:#9ca3af">(無詳細說明)</span>';
    const tip = '<div class="tip"><div class="tip-title">'+title+'<span class="tip-tag">'+tagTW+'</span></div>'+sdHTML+upHTML+'</div>';
    return '<span class="skill-icon-wrap">'+ic+tip+'</span>';
  }).join('') + '</div>';
}

function summaryHTML(h){
  const s = t(h.summary) || h.summary || '';
  if (!s) return '<span class="empty">—</span>';
  return esc(s);
}

function buildRows(){
  const rows = HEROES.map(h => {
    const g = genInfo(h);
    const unit = unitTW(h);
    return {
      h, g, unit,
      sortKey: [-g.order, UNIT_ORDER[unit] ?? 9, cnName(h)]
    };
  });
  rows.sort((a,b) => {
    for (let i=0;i<a.sortKey.length;i++){
      const x=a.sortKey[i], y=b.sortKey[i];
      if (x<y) return -1; if (x>y) return 1;
    }
    return 0;
  });
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => {
    const h = r.h, g = r.g, unit = r.unit;
    const cn = cnName(h);
    const en = h.name || '';
    return '<tr>'+
      '<td class="gen-cell"><span class="badge '+g.cls+'">'+g.label+'</span></td>'+
      '<td><span class="b-unit b-u-'+unit+'">'+unit+'</span></td>'+
      '<td class="name-cell"><span class="name-cn">'+esc(cn)+'</span><span class="name-en">'+esc(en)+'</span></td>'+
      '<td>'+(h.image ? '<img class="avatar" src="'+img(h.image)+'" alt="" loading="lazy">' : '<span class="empty">—</span>')+'</td>'+
      '<td>'+sourcesHTML(h)+'</td>'+
      '<td class="gear-cell">'+gearExclusiveSkillHTML(h,'expedition')+'</td>'+
      '<td>'+gearExpeditionStatsHTML(h)+'</td>'+
      '<td>'+skillIconsHTML(h,'expedition')+'</td>'+
      '<td class="gear-cell">'+gearExclusiveSkillHTML(h,'conquest')+'</td>'+
      '<td>'+skillIconsHTML(h,'conquest')+'</td>'+
      '<td class="summary-cell">'+summaryHTML(h)+'</td>'+
    '</tr>';
  }).join('');
  document.getElementById('rowCount').textContent = rows.length;
  populateFilters();
}

function populateFilters(){
  const tbody = document.getElementById('tbody');
  const rows = Array.from(tbody.rows);
  const cols = [0,1,4];
  cols.forEach(c => {
    const sel = document.querySelector('select[data-col="'+c+'"]');
    if (!sel) return;
    const vals = new Set();
    rows.forEach(r => {
      const cell = r.cells[c];
      if (!cell) return;
      if (c===4) {
        cell.querySelectorAll('.src-tag').forEach(s => vals.add(s.textContent.trim()));
      } else {
        const v = cell.textContent.trim();
        if (v && v !== '—') vals.add(v);
      }
    });
    // preserve current selection
    const cur = sel.value;
    const sorted = Array.from(vals).sort();
    sel.innerHTML = '<option value="">全部</option>' + sorted.map(v => '<option value="'+v.replace(/"/g,'&quot;')+'">'+v+'</option>').join('');
    sel.value = cur;
  });
}

function applyFilters(){
  const filters = Array.from(document.querySelectorAll('[data-col]')).map(el => ({
    col: +el.dataset.col, val: el.value.trim().toLowerCase(), isSelect: el.tagName==='SELECT'
  })).filter(f => f.val);
  const tbody = document.getElementById('tbody');
  let shown = 0;
  Array.from(tbody.rows).forEach(r => {
    const ok = filters.every(f => {
      const cell = r.cells[f.col];
      if (!cell) return false;
      const txt = cell.textContent.toLowerCase();
      return f.isSelect ? txt.includes(f.val) : txt.includes(f.val);
    });
    r.style.display = ok ? '' : 'none';
    if (ok) shown++;
  });
  document.getElementById('rowCount').textContent = shown;
}

document.addEventListener('input', e => { if (e.target.matches('[data-col]')) applyFilters(); });
document.addEventListener('change', e => { if (e.target.matches('[data-col]')) applyFilters(); });

buildRows();
</script>
